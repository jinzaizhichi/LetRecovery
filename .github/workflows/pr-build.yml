name: PR Build Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Build Rust · ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PE端
            dir: PE端
          - name: 正常系统端
            dir: 正常系统端
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: cargo build --locked

  website:
    name: Build 官网
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 官网
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 官网/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
